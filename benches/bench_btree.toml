# Bench our mid-level B-trees

# maximize lookahead buffer, we don't actually gc so we only get one pass
# of the disk for these tests
defines.LOOKAHEAD_SIZE = '(BLOCK_COUNT+8-1) / 8'

[cases.bench_btree_btree]
# 0 = in-order
# 1 = reversed-order
# 2 = random-order
defines.ORDER = [0, 1, 2]
defines.N = 1024
defines.STEP = 1
defines.SEED = 42
defines.SIZE = 4
in = 'littlefs3/lfs.c'
code = '''
    lfs_t lfs;
    lfs_init(&lfs, LFS_M_RDWR, CFG) => 0;
    // create free lookahead
    memset(lfs.lookahead.buffer, 0, CFG->lookahead_size);
    lfs.lookahead.window = 2;
    lfs.lookahead.off = 0;
    lfs.lookahead.size = lfs_min(8*CFG->lookahead_size,
            CFG->block_count-2);
    lfs_alloc_ckpoint(&lfs);

    // create a tree with N elements
    lfsr_btree_t btree;
    lfsr_btree_init(&btree);
    uint32_t prng = SEED;
    for (lfsr_bid_t i = 0; i < N; i++) {
        lfsr_bid_t i_
                = (ORDER == 0) ? i
                : (ORDER == 1) ? 0
                : BENCH_PRNG(&prng) % (btree.weight+1);
        // measure commits
        if ((i+1) % STEP == 0) {
            BENCH_START("commit", i+1);
        }
        uint8_t wbuf[SIZE];
        memset(wbuf, 'a'+(BENCH_PRNG(&prng) % 26), SIZE);
        lfsr_btree_commit(&lfs, &btree, i_, LFSR_RATTRS(
                LFSR_RATTR_BUF(
                    LFSR_TAG_DATA, +1,
                    wbuf, SIZE))) => 0;
        if ((i+1) % STEP == 0) {
            BENCH_STOP("commit");
        }

        // measure lookups
        if ((i+1) % STEP == 0) {
            BENCH_START("lookup", i+1);
            lfsr_bid_t i_ = BENCH_PRNG(&prng) % (i+1);
            lfsr_bid_t bid_;
            lfsr_rbyd_t rbyd_;
            lfsr_srid_t rid_;
            lfsr_tag_t tag_;
            lfsr_bid_t weight_;
            lfsr_data_t data_;
            lfsr_btree_lookupleaf(&lfs, &btree, i_,
                    &bid_, &rbyd_, &rid_, &tag_, &weight_, &data_) => 0;
            assert(bid_ == i_);
            assert(tag_ == LFSR_TAG_DATA);
            assert(weight_ == 1);
            assert(lfsr_data_size(data_) == SIZE);
            BENCH_STOP("lookup");
        }

        // measure disk usage
        if ((i+1) % STEP == 0) {
            lfs_off_t count = 0;

            lfsr_btraversal_t bt;
            lfsr_btraversal_init(&bt);
            while (true) {
                lfsr_bid_t bid_;
                lfsr_tag_t tag_;
                lfsr_data_t data_;
                int err = lfsr_btree_traverse(&lfs, &btree, &bt,
                        &bid_, &tag_, &data_);
                assert(!err || err == LFS_ERR_NOENT);
                if (err == LFS_ERR_NOENT) {
                    break;
                }

                if (tag_ == LFSR_TAG_BRANCH) {
                    count += 1;
                }
            }

            BENCH_RESULT("usage", i+1,
                    (uintmax_t)count * CFG->block_size);
        }
    }
'''

[cases.bench_btree_namedbtree]
# 0 = in-order
# 1 = reversed-order
# 2 = random-order
defines.ORDER = [0, 1, 2]
defines.N = 1024
defines.STEP = 1
defines.SEED = 42
defines.SIZE = 4
in = 'littlefs3/lfs.c'
code = '''
    lfs_t lfs;
    lfs_init(&lfs, LFS_M_RDWR, CFG) => 0;
    // create free lookahead
    memset(lfs.lookahead.buffer, 0, CFG->lookahead_size);
    lfs.lookahead.window = 2;
    lfs.lookahead.off = 0;
    lfs.lookahead.size = lfs_min(8*CFG->lookahead_size,
            CFG->block_count-2);
    lfs_alloc_ckpoint(&lfs);

    // create a tree with N elements
    lfsr_btree_t btree;
    lfsr_btree_init(&btree);
    uint32_t prng = SEED;
    for (lfsr_bid_t i = 0; i < N; i++) {
        lfsr_bid_t i_
                = (ORDER == 0) ? i
                : (ORDER == 1) ? N-1-i
                : BENCH_PRNG(&prng) % N;
        // measure name commits
        if ((i+1) % STEP == 0) {
            BENCH_START("commit", i+1);
        }
        char name[256];
        sprintf(name, "e%05d", i_);
        uint8_t wbuf[SIZE];
        memset(wbuf, 'a'+(BENCH_PRNG(&prng) % 26), SIZE);
        // we need to map names to bids before we can commit, so include
        // that in the commit cost
        lfsr_bid_t bid;
        lfsr_rbyd_t rbyd;
        lfsr_srid_t rid;
        lfsr_tag_t tag;
        lfsr_bid_t weight;
        lfsr_data_t data;
        lfs_scmp_t cmp = lfsr_btree_namelookupleaf(&lfs, &btree,
                0, name, strlen(name),
                &bid, &rbyd, &rid, &tag, &weight, &data);
        assert(cmp >= 0 || cmp == LFS_ERR_NOENT);
        if (cmp == LFS_ERR_NOENT) {
            lfsr_btree_commit(&lfs, &btree, 0, LFSR_RATTRS(
                    LFSR_RATTR_NAME(
                        LFSR_TAG_REG, +1,
                        0, name, strlen(name)),
                    LFSR_RATTR_BUF(
                        LFSR_TAG_DATA, 0,
                        wbuf, SIZE))) => 0;
        } else if (cmp > LFS_CMP_EQ) {
            lfsr_btree_commit(&lfs, &btree, bid, LFSR_RATTRS(
                    LFSR_RATTR_NAME(
                        LFSR_TAG_REG, +1,
                        0, name, strlen(name)),
                    LFSR_RATTR_BUF(
                        LFSR_TAG_DATA, 0,
                        wbuf, SIZE))) => 0;
        } else if (cmp < LFS_CMP_EQ) {
            lfsr_btree_commit(&lfs, &btree, bid, LFSR_RATTRS(
                    // yes, we need this noop
                    LFSR_RATTR_NOOP(),
                    LFSR_RATTR_NAME(
                        LFSR_TAG_REG, +1,
                        0, name, strlen(name)),
                    LFSR_RATTR_BUF(
                        LFSR_TAG_DATA, 0,
                        wbuf, SIZE))) => 0;
        } else {
            lfsr_btree_commit(&lfs, &btree, bid, LFSR_RATTRS(
                    LFSR_RATTR_BUF(
                        LFSR_TAG_DATA, 0,
                        wbuf, SIZE))) => 0;
        }
        if ((i+1) % STEP == 0) {
            BENCH_STOP("commit");
        }

        // measure name lookups
        if ((i+1) % STEP == 0) {
            BENCH_START("namelookup", i+1);
            lfsr_bid_t i_ = BENCH_PRNG(&prng) % N;
            sprintf(name, "e%05d", i_);
            lfsr_bid_t bid_;
            lfsr_rbyd_t rbyd_;
            lfsr_srid_t rid_;
            lfsr_tag_t tag_;
            lfsr_bid_t weight_;
            lfsr_data_t data_;
            lfs_scmp_t cmp = lfsr_btree_namelookupleaf(&lfs, &btree,
                    0, name, strlen(name),
                    &bid_, &rbyd_, &rid_, &tag_, &weight_, &data_);
            assert(cmp >= 0 || cmp == LFS_ERR_NOENT);
            if (cmp != LFS_ERR_NOENT) {
                assert(tag_ == LFSR_TAG_REG);
                assert(weight_ == 1);
                assert(lfsr_data_size(data_) == 1+strlen(name));
            }
            BENCH_STOP("namelookup");
        }

        // measure lookups
        if ((i+1) % STEP == 0) {
            BENCH_START("lookup", i+1);
            lfsr_bid_t i_ = BENCH_PRNG(&prng) % (i+1);
            lfsr_bid_t bid_;
            lfsr_rbyd_t rbyd_;
            lfsr_srid_t rid_;
            lfsr_tag_t tag_;
            lfsr_bid_t weight_;
            lfsr_data_t data_;
            int err = lfsr_btree_lookupleaf(&lfs, &btree, i_,
                    &bid_, &rbyd_, &rid_, &tag_, &weight_, &data_);
            assert(!err || err == LFS_ERR_NOENT);
            if (err != LFS_ERR_NOENT) {
                assert(bid_ == i_);
                assert(tag_ == LFSR_TAG_REG);
                assert(weight_ == 1);
                assert(lfsr_data_size(data_) == 1+strlen(name));
            }
            BENCH_STOP("lookup");
        }

        // measure disk usage
        if ((i+1) % STEP == 0) {
            lfs_off_t count = 0;

            lfsr_btraversal_t bt;
            lfsr_btraversal_init(&bt);
            while (true) {
                lfsr_bid_t bid_;
                lfsr_tag_t tag_;
                lfsr_data_t data_;
                int err = lfsr_btree_traverse(&lfs, &btree, &bt,
                        &bid_, &tag_, &data_);
                assert(!err || err == LFS_ERR_NOENT);
                if (err == LFS_ERR_NOENT) {
                    break;
                }

                if (tag_ == LFSR_TAG_BRANCH) {
                    count += 1;
                }
            }

            BENCH_RESULT("usage", i+1,
                    (uintmax_t)count * CFG->block_size);
        }
    }
'''
